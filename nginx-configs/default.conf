# Nextbase default block — keep this file; do not remove.
# Domain-specific configs are auto-generated alongside this file.

server {
    listen 80 default_server;
    server_name _;

    # ACME challenge for all domains (certbot webroot method)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 "Nextbase Proxy Ready\n";
        add_header Content-Type text/plain;
    }
}
